<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product List</title>
    <style>
    	body
	 {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: Azure;
        color: #333;
    	}

    	h1 
	{
	background-color: Bisque;
        color: #444;
    	}

    	table 
	{
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    	}

    	table, th, td 
	{
        border: 1px solid #ccc;
    	}

    	th, td 
	{
        padding: 10px;
        text-align: left;
    	}

    th {
        background-color: #f2f2f2;
   	 }

    	a 
	{
        text-decoration: none;
        color: #007BFF;
    	}

    	a:hover 
	{
        text-decoration: underline;
   	 }

    	form 
	{
        max-width: 400px;
        background: #fff;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 5px;
    	}

    	label 
	{
        display: block;
        margin-top: 10px;
        font-weight: bold;
    	}

    	input[type="text"],
    	input[type="number"] 
	{
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
    	}

    button 
	{
        margin-top: 15px;
        padding: 10px 15px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    button:hover {
        background-color: #218838;
    }

    p a {
        color: #555;
    }
</style>
</head>
<body>
    <h1>Product List</h1>
    <a href="/products/create">Create New Product</a>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.id}"></td>
                <td th:text="${product.name}"></td>
                <td th:text="${product.price}"></td>
                <td>
                    <a th:href="@{/products/edit/{id}(id=${product.id})}">Edit</a> |
                    <a th:href="@{/products/delete/{id}(id=${product.id})}">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
